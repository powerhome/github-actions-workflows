name: build-ruby-gem

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Ruby ${{ matrix.ruby }}
    strategy:
      fail-fast: true
      matrix:
        ruby:
          - 3.3
          - 3.4
          - 4.0
    steps:
      - uses: actions/checkout@v6
      - name: 'Test ruby gem action'
        uses: ./build-ruby-gem
        with:
          workdir: build-ruby-gem/test
          ruby: ${{ matrix.ruby }}
